# docker-compose.yml
# Local development: PostgreSQL 16 + Redis 7
# App services are run via pnpm dev (not Docker) during development.
# Uncomment app services after Plans 1B/1C/1D/1E add Dockerfiles.

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: wms_platform
      POSTGRES_USER: wms
      POSTGRES_PASSWORD: wms_local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wms -d wms_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── App services (uncomment after Dockerfiles are added) ───
